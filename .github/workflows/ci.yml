name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: "true"
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Security Audit
        run: pnpm audit --audit-level=high

      # Cache Turborepo outputs
      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      # Turborepo automatically handles internal caching across the monorepo
      - name: Turbo Build
        run: pnpm run build

      - name: Turbo Type Check
        run: pnpm run type-check

      - name: Turbo Lint
        run: pnpm run lint

      - name: Run Tests
        run: pnpm run test


      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run E2E Tests (Playwright)
        run: npx playwright test

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/frontend/playwright-report/
          retention-days: 14

      - name: Authenticate to Google Cloud
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/100198375762/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@gen-lang-client-0393063451.iam.gserviceaccount.com'

      - name: 'Set up Cloud SDK'
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Build and Push Docker Images
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet
          docker build -t europe-west1-docker.pkg.dev/gen-lang-client-0393063451/atlas/atlas-backend:latest -f Dockerfile.backend .
          docker push europe-west1-docker.pkg.dev/gen-lang-client-0393063451/atlas/atlas-backend:latest
          docker build --build-arg VITE_API_URL=https://atlas-backend-100198375762.europe-west1.run.app/api -t europe-west1-docker.pkg.dev/gen-lang-client-0393063451/atlas/atlas-frontend:latest -f Dockerfile .
          docker push europe-west1-docker.pkg.dev/gen-lang-client-0393063451/atlas/atlas-frontend:latest

      - name: Deploy Backend to Cloud Run
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          gcloud run deploy atlas-backend \
            --image europe-west1-docker.pkg.dev/gen-lang-client-0393063451/atlas/atlas-backend:latest \
            --region europe-west1 \
            --allow-unauthenticated \
            --set-secrets="DATABASE_URL=DATABASE_URL:latest,CAMUNDA_CLIENT_ID=CAMUNDA_CLIENT_ID:latest,CAMUNDA_CLIENT_SECRET=CAMUNDA_CLIENT_SECRET:latest,CAMUNDA_CLUSTER_ID=CAMUNDA_CLUSTER_ID:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest" \
            --add-cloudsql-instances="gen-lang-client-0393063451:europe-west1:atlas-db-prod" \
            --quiet

      - name: Deploy Frontend to Cloud Run
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          gcloud run deploy atlas-logistics \
            --image europe-west1-docker.pkg.dev/gen-lang-client-0393063451/atlas/atlas-frontend:latest \
            --region europe-west1 \
            --allow-unauthenticated \
            --quiet
