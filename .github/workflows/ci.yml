name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: "true"
      # Turborepo remote caching can be configured here if available

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      # Cache Turborepo outputs
      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      # Turborepo automatically handles internal caching across the monorepo
      - name: Turbo Build
        run: pnpm run build

      - name: Turbo Type Check
        run: pnpm run type-check

      - name: Turbo Lint
        run: pnpm run lint

      - name: Run Tests
        run: pnpm run test
