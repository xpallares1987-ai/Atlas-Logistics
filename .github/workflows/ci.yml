name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: "true"
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Security Audit
        run: pnpm audit --audit-level=high

      # Cache Turborepo outputs
      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      # Turborepo automatically handles internal caching across the monorepo
      - name: Turbo Build
        run: pnpm run build

      - name: Turbo Type Check
        run: pnpm run type-check

      - name: Turbo Lint
        run: pnpm run lint

      - name: Run Tests
        run: pnpm run test

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run E2E Tests (Playwright)
        run: npx playwright test

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/frontend/playwright-report/
          retention-days: 14

      - name: Authenticate to Google Cloud
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/100198375762/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@gen-lang-client-0393063451.iam.gserviceaccount.com'

      - name: Deploy to Firebase (Production)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          npm install -g firebase-tools
          firebase deploy --non-interactive

      - name: Deploy to Firebase (Preview Channel)
        if: github.event_name == 'pull_request' && env.FIREBASE_TOKEN != ''
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          npm install -g firebase-tools
          firebase hosting:channel:deploy pr-${{ github.event.number }} --expires 7d
