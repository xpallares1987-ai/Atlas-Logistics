name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        run: npm install -g pnpm@10
      - name: Checkout Control-Tower-UI
        run: git clone https://github.com/xpallares1987-ai/Control-Tower-UI.git ../Control-Tower-UI && cd ../Control-Tower-UI && pnpm install --no-frozen-lockfile && pnpm run build


      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Build Frontend
        run: pnpm run build:frontend

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './packages/frontend/out'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4





