<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atlas-Logistics</title>
    <meta name="description" content="SCM Freight Forwarding Platform" />
    <style>
      :root {
        --bg-color: #f4f4f9;
        --text-color: #1a1a1a;
      }
      body {
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
      }
      #app {
        display: grid;
        grid-template-columns: 250px 1fr;
        min-height: 100vh;
      }
      nav {
        background: #ffffff;
        border-right: 1px solid #eaeaea;
        padding: 1.5rem;
      }
      nav h2 {
        margin-top: 0;
        color: #2563eb;
        letter-spacing: -0.5px;
      }
      main {
        padding: 2rem;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
        align-items: start;
      }
      .full-width {
        grid-column: 1 / -1;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <nav>
        <h2>Atlas</h2>
      </nav>
      <main>
        <freight-calculator></freight-calculator>
        <document-generator></document-generator>
        <div class="full-width">
          <shipment-dashboard></shipment-dashboard>
        </div>
      </main>
    </div>
    <script type="module" src="./components/shipment-dashboard.ts"></script>
    <script type="module" src="./components/freight-calculator.ts"></script>
    <script type="module" src="./components/document-generator.ts"></script>
  </body>
</html>
