server {
    listen 80;
    server_name localhost;
    absolute_redirect off;

    location = / {
        return 301 /Shipment-Dashboard/;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ $uri.html /Shipment-Dashboard/index.html;
    }
}
