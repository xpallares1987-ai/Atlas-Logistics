name: Encrypt Data

on:
  push:
    branches: [main]
    # Optional: also trigger on tags if you prefer
    # tags: ['v*']
  # pull_request:
  #   branches: [main]

permissions:
  contents: read
  actions: write

jobs:
  encrypt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'


      - name: Setup pnpm
        run: npm install -g pnpm@10
      - name: Checkout Control-Tower-UI
        run: git clone https://github.com/xpallares1987-ai/Control-Tower-UI.git ../Control-Tower-UI && cd ../Control-Tower-UI && pnpm install --no-frozen-lockfile && pnpm run build


      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run encryption script
        env:
          ENCRYPTED_DATA: ${{ secrets.ENCRYPTED_DATA }}
        run: |
          pwsh ./scripts/run-encrypt.ps1

      - name: Upload encrypted asset
        uses: actions/upload-artifact@v4
        with:
          name: encrypted-data
          path: ./assets/datos_encrypted.js

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-






