name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: 'true'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Checkout Control-Tower-UI
        run: git clone https://github.com/xpallares1987-ai/Control-Tower-UI.git ../Control-Tower-UI && cd ../Control-Tower-UI && pnpm install --no-frozen-lockfile && pnpm run build

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Type Check
        run: pnpm run type-check

      - name: Run Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build
