services:
  bpmn-modeler:
    build:
      context: .
      dockerfile: BPMN-Modeler/Dockerfile
    restart: unless-stopped

  freight-comparer:
    build:
      context: .
      dockerfile: Freight-Comparer/Dockerfile
    restart: unless-stopped

  shipment-dashboard:
    build:
      context: .
      dockerfile: Shipment-Dashboard/Dockerfile
    restart: unless-stopped

  atlas-logistics:
    build:
      context: .
      dockerfile: Atlas-Logistics/Dockerfile
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      db-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  db-migrate:
    build:
      context: .
      dockerfile: Atlas-Logistics/Dockerfile
      target: builder
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    command: ["pnpm", "--filter", "atlas-logistics", "db:migrate"]
    depends_on:
      db:
        condition: service_healthy
    restart: no

  db:
    image: postgres:15-alpine
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d atlas"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  gateway:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - bpmn-modeler
      - freight-comparer
      - shipment-dashboard
      - atlas-logistics
    restart: unless-stopped

volumes:
  pgdata: