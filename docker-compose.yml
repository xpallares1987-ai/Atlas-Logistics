version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://scm_user:scm_password@postgres:5432/scm_db
      - REDIS_URL=redis://redis:6379
      - ZEEBE_CLUSTER_ID=${ZEEBE_CLUSTER_ID}
      - ZEEBE_CLIENT_ID=${ZEEBE_CLIENT_ID}
      - ZEEBE_CLIENT_SECRET=${ZEEBE_CLIENT_SECRET}
      - ZEEBE_CLUSTER_REGION=${ZEEBE_CLUSTER_REGION}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine3.21
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=scm_user
      - POSTGRES_PASSWORD=scm_password
      - POSTGRES_DB=scm_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine3.21
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  zeebe:
    image: camunda/zeebe:8.6.0
    environment:
      - ZEEBE_BROKER_NETWORK_HOST=0.0.0.0
      - ZEEBE_BROKER_NETWORK_PORT=26500
      - ZEEBE_BROKER_GATEWAY_ENABLE=true
      - ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_CLASSNAME=io.camunda.zeebe.exporter.ElasticsearchExporter
      - ZEEBE_LOG_LEVEL=info
    ports:
      - "26500:26500"
      - "9600:9600"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: