services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    pull_policy: always
    ports:
      - "3001:3001"
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - DATABASE_URL=postgresql://postgres:r79GzpkKocj4QpKWTIPC@db:5432/scm_db
      - GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp/application_default_credentials.json
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ${APPDATA}/gcloud/application_default_credentials.json:/tmp/gcp/application_default_credentials.json:ro

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    pull_policy: always
    command: ["--import", "tsx/esm", "src/worker-node.ts"]
    env_file:
      - .env.local
    environment:
      - REDIS_HOST=redis
      - DATABASE_URL=postgresql://postgres:r79GzpkKocj4QpKWTIPC@db:5432/scm_db
      - GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp/application_default_credentials.json
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ${APPDATA}/gcloud/application_default_credentials.json:/tmp/gcp/application_default_credentials.json:ro

  db:
    image: postgres:16-alpine
    pull_policy: always
    env_file:
      - .env.local
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d scm_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    pull_policy: always
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata: