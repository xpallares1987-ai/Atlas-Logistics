type User @table(key: "uid") {
  uid: String!
  tenantId: String! @default(value: "atlas-default-tenant")
  email: String!
  displayName: String
  role: String! # ADMIN, EXECUTIVE, ICT, MANAGER, TEAM_LEADER, SALES, PROCUREMENT, OPERATOR
  isActive: Boolean! @default(value: true)
}

type Company @table {
  tenantId: String! @default(value: "atlas-default-tenant")
  name: String!
  legalName: String
  taxId: String
  eoriNumber: String
  scacCode: String
  entityType: String! # CUSTOMER, SUPPLIER, BUYER, MANUFACTURER, CARRIER, HAULIER, CUSTOMS_BROKER, FREIGHT_FORWARDER, WAREHOUSE, AGENT
  email: String
  phoneNumber: String
  address: String
  city: String
  country: String
  countryCode: String
  contactPerson: String
  creditLimit: Float
  paymentTerms: String
  rating: Int
  postalCode: String
  notes: String
  isActive: Boolean! @default(value: true)
}

type Location @table(key: "locode") {
  locode: String!
  name: String!
  country: String
  countryCode: String
  countryName: String
  region: String
  type: String! # PORT, AIRPORT, RAIL_TERMINAL, INLAND_DEPOT
  latitude: Float
  longitude: Float
}

type Quote @table {
  tenantId: String! @default(value: "atlas-default-tenant")
  quoteNumber: String! @unique
  status: String! # DRAFT, SENT, ACCEPTED, REJECTED, EXPIRED
  movementType: String! # FCL, LCL, AIR, FTL, LTL, RO-RO
  incoterm: Incoterm @ref
  origin: String!
  destination: String!
  commodity: String
  hsCode: HsCode @ref
  equipmentType: String # 20GP, 40GP, 40HC, 45HC, 20RF, 40RF
  grossWeight: Float
  hsCodeLegacy: String @col(name: "hs_code")
  incotermLegacy: String @col(name: "incoterm")
  volume: Float
  baseFreightCost: Float!
  baf: Float
  caf: Float
  thcOrigin: Float
  thcDest: Float
  customsOrigin: Float
  customsDest: Float
  insurance: Float
  margin: Float
  totalCost: Float!
  totalPrice: Float
  currency: String! @default(value: "USD")
  validUntil: Date
  validityDate: Date!
  createdByUid: String!
  customer: Company! @ref
  carrier: Company @ref
  notes: String
}

type Shipment @table {
  tenantId: String! @default(value: "atlas-default-tenant")
  trackingNumber: String! @unique
  mblNumber: String
  hblNumber: String
  bookingNumber: String
  status: String! @default(value: "QUOTED") # QUOTED, BOOKED, GATED_IN, DEPARTED, ARRIVED, CLEARED, DELIVERED
  customsStatus: String # PENDING, CLEARED, INSPECTION, HOLD, RELEASED
  movementType: String! # FCL, LCL, AIR, FTL, LTL, RO-RO
  direction: String! # IMPORT, EXPORT, CROSS_TRADE, DOMESTIC
  incoterm: Incoterm @ref
  freightTerms: String # PREPAID, COLLECT
  origin: String!
  hsCodeLegacy: String @col(name: "hs_code")
  incotermLegacy: String @col(name: "incoterm")
  pol: String!
  pod: String!
  destination: String!
  etd: Timestamp
  eta: Timestamp
  atd: Timestamp
  ata: Timestamp
  bookingDate: Timestamp
  emptyPickupDate: Timestamp
  gatedInDate: Timestamp
  loadedOnVesselDate: Timestamp
  dischargedDate: Timestamp
  gatedOutDate: Timestamp
  deliveryDate: Timestamp
  cyCutOff: Timestamp
  siCutOff: Timestamp
  vgmCutOff: Timestamp
  commodity: String
  hsCode: HsCode @ref
  packages: Int
  packageType: String # PALLET, CARTON, DRUM, BAG, CRATE
  equipmentType: String # 20GP, 40GP, 40HC, 45HC, 20RF, 40RF
  grossWeight: Float
  netWeight: Float
  volume: Float
  isDangerous: Boolean! @default(value: false)
  unNumber: String
  imdgClass: String
  isReefer: Boolean! @default(value: false)
  temperature: String
  isOOG: Boolean! @default(value: false)
  freightPayableAt: String # ORIGIN, DESTINATION
  freightPaid: Boolean @default(value: false)
  declaredValue: Float
  insurance: Boolean @default(value: false)
  insuranceValue: Float
  customer: Company! @ref
  supplier: Company @ref
  shipperAddressShape: String
  consigneeAddressShape: String
  notifyAddressShape: String
  deliveryAddressShape: String
  carrier: Company @ref
  haulierOrigin: Company @ref
  haulierDestination: Company @ref
  description: String
  timestamp: Timestamp @default(expr: "request.time")
  location: String
  vessel: String
  vesselName: String
  voyage: String
  voyageNumber: String
  ets: Timestamp
  isEstimated: Boolean! @default(value: false)
  source: String # MANUAL, AIS, EDI, API
}

type Document @table {
  tenantId: String! @default(value: "atlas-default-tenant")
  documentNumber: String
  documentType: String! # MBL, HBL, SEAWAY, CMR, AWB, COMMERCIAL_INVOICE, PACKING_LIST, CERTIFICATE_ORIGIN, CUSTOMS_ENTRY, INSPECTION_CERT, VGM, DG_DECLARATION, PHYTOSANITARY, FUMIGATION
  fileUrl: String!
  fileName: String
  mimeType: String
  status: String # DRAFT, ISSUED, SURRENDERED, TELEX_RELEASED, ORIGINAL_REQUIRED
  uploadDate: Timestamp @default(expr: "request.time")
  issuedDate: Date
  expiryDate: Date
  description: String
  signatoryName: String
  issuedBy: Company @ref
  shipment: Shipment @ref
  
  # OCR Workflow
  extractedData: Any
  ocrStatus: String @default(value: "NOT_APPLICABLE") # PENDING, APPROVED, REJECTED, NOT_APPLICABLE
}

type Milestone @table {
  tenantId: String! @default(value: "atlas-default-tenant")
  eventCode: String! # DCSA: VESSEL_ARRIVED, VESSEL_DEPARTED, CONTAINER_DISCHARGED, CUSTOMS_RELEASED, DELIVERED
  eventType: String! # TRANSPORT, EQUIPMENT, SHIPMENT, DOCUMENT
  description: String
  timestamp: Timestamp! @default(expr: "request.time")
  location: String
  vessel: String
  vesselName: String
  voyage: String
  voyageNumber: String
  ets: Timestamp
  isEstimated: Boolean! @default(value: false)
  source: String # MANUAL, AIS, EDI, API
  shipment: Shipment! @ref
}

type Invoice @table {
  tenantId: String! @default(value: "atlas-default-tenant")
  invoiceNumber: String! @unique
  invoiceType: String! # FREIGHT, CUSTOMS, DISBURSEMENT, CREDIT_NOTE, DEBIT_NOTE
  status: String! # DRAFT, SENT, PAID, OVERDUE, CANCELLED
  amount: Float!
  currency: String!
  exchangeRate: Float
  issueDate: Date!
  dueDate: Date!
  paymentDate: Date
  paymentMethod: String # BANK_TRANSFER, CASH, CHEQUE, CREDIT
  bankReference: String
  shipment: Shipment @ref
  customer: Company @ref
  createdBy: User @ref
  notes: String
}

type Workflow @table {
  tenantId: String! @default(value: "atlas-default-tenant")
  name: String!
  version: Int
  diagramXml: String!
  currentNode: String!
  status: String! # ACTIVE, PAUSED, COMPLETED, FAILED, SUSPENDED
  processId: String
  processInstanceKey: String
  incidentReason: String
  shipment: Shipment! @ref
}

type ShipmentEventLog @table {
  tenantId: String! @default(value: "atlas-default-tenant")
  shipment: Shipment! @ref
  eventType: String! # CREATED, STATUS_CHANGED, CUSTOMS_UPDATE, DOC_UPLOADED
  oldStatus: String
  newStatus: String
  performedBy: User @ref
  timestamp: Timestamp! @default(expr: "request.time")
  details: String
  ipAddress: String
  userAgent: String
}

type HsCode @table(key: "code") {
  code: String!               # Ej: "0901.11" (Café)
  description: String
  dutyRate: Float             # Arancel base de importación
  isHazardous: Boolean! @default(value: false)
  isActive: Boolean! @default(value: true)
}

type Incoterm @table(key: "code") {
  code: String!               # Ej: "FOB", "EXW", "DDP"
  description: String
  freightPayer: String!       # "BUYER" o "SELLER"
  originCustomsPayer: String! # "BUYER" o "SELLER"
  destCustomsPayer: String!   # "BUYER" o "SELLER"
  isActive: Boolean! @default(value: true)
}

type Vessel @table(key: "imoNumber") {
  imoNumber: String!          # Código identificador único del barco
  name: String!               # Ej: "MSC AMELIA"
  flag: String                # País de bandera
  carrier: Company! @ref      # Naviera dueña o armador
  capacityTeu: Int            # Capacidad en TEUs
  isActive: Boolean! @default(value: true)
}

type Schedule @table {
  tenantId: String! @default(value: "atlas-default-tenant")
  vessel: Vessel! @ref
  voyageNumber: String!
  pol: Location! @ref         # Port of Loading
  pod: Location! @ref         # Port of Discharge
  etd: Date!                  # Estimated Time of Departure
  eta: Date!                  # Estimated Time of Arrival
  cutOffDate: Timestamp       # Fecha límite de entrega de contenedor
  availableTeu: Int
  status: String! @default(value: "SCHEDULED") # SCHEDULED, DELAYED, CANCELLED
}

type CrmDeal @table {
  tenantId: String! @default(value: "atlas-default-tenant")
  title: String!
  customer: Company! @ref
  estimatedValue: Float
  status: String! @default(value: "LEAD") # LEAD, CONTACTED, QUOTING, NEGOTIATION, WON, LOST
  expectedCloseDate: Date
  assignedToUid: String!
  createdAt: Timestamp! @default(expr: "request.time")
}

type CrmInteraction @table {
  tenantId: String! @default(value: "atlas-default-tenant")
  customer: Company! @ref
  type: String! # VISIT, CALL, EMAIL
  date: Timestamp!
  notes: String
  outcome: String
  createdByUid: String!
}



type DictionaryTerm @table(key: ["acronym", "category"]) {
  acronym: String!
  meaning: String!
  description: String
  category: String!
  subCategory: String
  region: String
  moduleScope: [String!]
  isActive: Boolean! @default(value: true)
}

