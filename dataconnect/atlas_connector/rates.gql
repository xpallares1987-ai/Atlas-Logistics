query ListCompanies @auth(level: USER) {
  companies {
    id
    name
    entityType
    countryCode
  }
}

query SearchLocations($query: String!) @auth(level: USER) {
  locations(
    where: { 
      _or: [
        { name: { contains: $query } },
        { locode: { contains: $query } }
      ]
    }
    limit: 20
    orderBy: [{ name: ASC }]
  ) {
    locode
    name
    countryCode
    countryName
    type
  }
}

query ListQuotes(
  $tenantId: String!
  $origin: String
  $destination: String
) @auth(level: USER) {
  quotes(
    where: {
      tenantId: { eq: $tenantId }
      origin: { contains: $origin }
      destination: { contains: $destination }
    }
    orderBy: [{ validityDate: DESC }]
  ) {
    id
    tenantId
    quoteNumber
    status
    movementType
    origin
    destination
    baseFreightCost
    totalCost
    currency
    validityDate
    carrier {
      name
    }
  }
}
