query ListShipments($tenantId: String!) @auth(level: USER) {
  shipments(where: { tenantId: { eq: $tenantId } }, orderBy: [{ ets: DESC }]) {
    trackingNumber
    status
    origin
    destination
    vesselName
    voyageNumber
    movementType
    ets
    eta
    customer {
      name
    }
    supplier {
      name
    }
  }
}

query GetShipmentById($id: UUID!) @auth(level: USER) {
  shipment(id: $id) {
    trackingNumber
    status
    origin
    pol
    pod
    destination
    vesselName
    voyageNumber
    movementType
    ets
    eta
    packages
    grossWeight
    volume
    shipperAddressShape
    consigneeAddressShape
    customer {
      name
    }
    supplier {
      name
    }
    carrier {
      name
    }
  }
}

mutation CreateShipment(
  $trackingNumber: String!
  $status: String!
  $movementType: String!
  $direction: String!
  $incotermCode: String
  $origin: String!
  $pol: String!
  $pod: String!
  $destination: String!
  $customerId: UUID!
  $supplierId: UUID
  $shipperAddressShape: String
  $consigneeAddressShape: String
) @auth(level: USER) {
  shipment_insert(
    data: {
      trackingNumber: $trackingNumber
      status: $status
      movementType: $movementType
      direction: $direction
      incotermCode: $incotermCode
      origin: $origin
      pol: $pol
      pod: $pod
      destination: $destination
      customerId: $customerId
      supplierId: $supplierId
      shipperAddressShape: $shipperAddressShape
      consigneeAddressShape: $consigneeAddressShape
    }
  )
}

mutation LogShipmentEvent(
  $shipmentId: UUID!
  $eventType: String!
  $oldStatus: String
  $newStatus: String
  $details: String
) @auth(level: USER) {
  shipmentEventLog_insert(
    data: {
      shipmentId: $shipmentId
      eventType: $eventType
      oldStatus: $oldStatus
      newStatus: $newStatus
      details: $details
    }
  )
}
