# =====================================================================
# PROCUREMENT OPERATIONS
# =====================================================================

query ListCarriers($tenantId: String!) @auth(level: USER) {
  companies(where: { tenantId: { eq: $tenantId }, entityType: { eq: "CARRIER" } }) {
    id
    name
    email
    phoneNumber
    contactPerson
    city
    scacCode
    paymentTerms
    rating
    isActive
  }
}

